apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging

data:
  fluent-bit.conf: |
    [SERVICE]
        Flush               5
        Daemon              Off
        Log_Level           info
        Parsers_File        parsers.conf

    @INCLUDE input.conf
    @INCLUDE filter.conf
    @INCLUDE output.conf

  parsers.conf: |
    [PARSER]
        Name         cri
        Format       regex
        Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

  input.conf: |
    [INPUT]
        Name                tail
        Path                /var/log/containers/*.log
        Tag                 kube.*
        Parser              cri
        Refresh_Interval    5
        Mem_Buf_Limit       10MB
        Skip_Long_Lines     On

  filter.conf: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        Kube_Tag_Prefix     kube.var.log.containers.

  output.conf: |
    [OUTPUT]
        Name                  es
        Match                 kube.*
        Host                  elasticsearch-master
        Port                  9200
        Generate_ID           On
        Write_Operation       create
        Logstash_Format       On
        Logstash_Prefix       kubernetes
        Current_Time_Index    On
        Suppress_Type_Name    On
