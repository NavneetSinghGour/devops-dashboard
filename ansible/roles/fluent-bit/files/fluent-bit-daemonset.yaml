apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit

      tolerations:
      - operator: Exists

      containers:
      - name: fluent-bit
        image: cr.fluentbit.io/fluent/fluent-bit:3.2.2
        imagePullPolicy: IfNotPresent

        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true

        - name: config
          mountPath: /fluent-bit/etc/
          readOnly: true

      volumes:
      - name: varlog
        hostPath:
          path: /var/log

      - name: config
        configMap:
          name: fluent-bit-config
