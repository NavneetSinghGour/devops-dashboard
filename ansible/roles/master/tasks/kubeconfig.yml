---
- name: Create root .kube directory
  file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Copy admin.conf for root
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes
    owner: root
    group: root
    mode: '0600'

- name: Create ubuntu .kube directory
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0700'

- name: Copy admin.conf for ubuntu
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu
    mode: '0600'

- name: Verify kubectl connectivity as root
  command: kubectl get nodes
  environment:
    KUBECONFIG: /root/.kube/config
  register: kubectl_root
  changed_when: false

- name: Show kubectl output (root)
  debug:
    var: kubectl_root.stdout_lines

- name: Verify kubectl connectivity as ubuntu
  become: true
  become_user: ubuntu
  command: kubectl get nodes
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: kubectl_ubuntu
  changed_when: false

- name: Show kubectl output (ubuntu)
  debug:
    var: kubectl_ubuntu.stdout_lines
